<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1E2A32">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Processing">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Processing Cards</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { background: #F0F3F5; font-family: 'Nunito', system-ui, sans-serif; }

  .header {
    background: #1E2A32; color: white;
    padding: 52px 20px 16px;
  }
  .eyebrow {
    font-size: 10px; font-weight: 700; letter-spacing: 0.14em;
    text-transform: uppercase; color: rgba(255,255,255,0.4); margin-bottom: 4px;
  }
  h1 { font-size: 22px; font-weight: 900; }
  .header p { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 3px; }

  .tabs {
    display: flex; background: #1E2A32;
    padding: 0 16px 14px; gap: 8px;
  }
  .tab {
    flex: 1; padding: 9px 12px; border-radius: 10px; border: none;
    font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 13px;
    cursor: pointer; background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.45);
  }
  .tab.active { background: white; color: #1E2A32; }

  .scroll { padding: 14px 14px 60px; }
  .grid { display: flex; flex-direction: column; gap: 10px; }

  .chip {
    background: white;
    border-radius: 20px;
    padding: 24px 20px 20px;
    text-align: center;
    cursor: pointer;
    border: 2.5px solid transparent;
    box-shadow: 0 1px 5px rgba(0,0,0,0.06);
    transition: transform 0.1s, border-color 0.12s;
  }
  .chip:active { transform: scale(0.97); }
  .chip.flash { border-color: #4A8C6A; box-shadow: 0 0 0 3px rgba(74,140,106,0.18); }

  .icon-wrap {
    width: 80px; height: 80px; border-radius: 50%;
    background: #EDF4FA;
    display: flex; align-items: center; justify-content: center;
    font-size: 40px; margin: 0 auto 14px;
  }
  .chip-word { font-size: 18px; font-weight: 800; color: #1E2A32; margin-bottom: 5px; }
  .chip-sub  { font-size: 14px; font-weight: 600; color: #9AAAB4; }

  .toast {
    position: fixed;
    bottom: calc(24px + env(safe-area-inset-bottom, 0px));
    left: 50%; transform: translateX(-50%) translateY(70px);
    background: #1E2A32; color: white;
    font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 13px;
    padding: 11px 22px; border-radius: 40px;
    transition: transform 0.22s ease;
    pointer-events: none; white-space: nowrap; z-index: 99;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .pane { display: none; }
  .pane.active { display: block; }
</style>
</head>
<body>

<div class="header">
  <div class="eyebrow">For any moment</div>
  <h1>Processing Cards</h1>
  <p>Tap a card to copy — paste into WhatsApp</p>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('state',this)">My State</button>
  <button class="tab" onclick="switchTab('support',this)">Support Needed</button>
  <button class="tab" onclick="switchTab('travel',this)">Travel</button>
</div>

<div class="scroll">
  <div class="pane active" id="pane-state">
    <div class="grid" id="grid-state"></div>
  </div>
  <div class="pane" id="pane-support">
    <div class="grid" id="grid-support"></div>
  </div>
  <div class="pane" id="pane-travel">
    <div class="grid" id="grid-travel"></div>
  </div>
</div>

<div class="toast" id="toast">Copied ✓ — paste into WhatsApp</div>

<script>
const STATE = [
  { e:"🫧", w:"Brain Fog",           s:"hard to think clearly",    t:"🫧 Brain Fog\nhard to think clearly" },
  { e:"🌀", w:"Looping Thoughts",    s:"can't switch off",         t:"🌀 Looping Thoughts\ncan't switch off" },
  { e:"🧶", w:"Tangled Feelings",    s:"too much at once",         t:"🧶 Tangled Feelings\ntoo much at once" },
  { e:"🔇", w:"Can't Find Words",    s:"or language",              t:"🔇 Can't Find Words\nor language" },
  { e:"🌊", w:"Emotional Flood",     s:"feeling overwhelmed",      t:"🌊 Emotional Flood\nfeeling overwhelmed" },
  { e:"📡", w:"Signal's Weak",       s:"low bandwidth",            t:"📡 Signal's Weak\nlow bandwidth" },
  { e:"🪞", w:"Replaying Something", s:"",                         t:"🪞 Replaying Something" },
  { e:"⚖️", w:"Decision Paralysis",  s:"",                         t:"⚖️ Decision Paralysis" },
  { e:"🔋", w:"Running on Empty",    s:"depleted",                 t:"🔋 Running on Empty\ndepleted" },
  { e:"🧱", w:"Wall Hit",            s:"sudden shutdown",          t:"🧱 Wall Hit\nsudden shutdown" },
  { e:"🌫️", w:"Dissociating",        s:"",                         t:"🌫️ Dissociating" },
  { e:"🎛️", w:"Everything's Loud",   s:"sensory / mental noise",   t:"🎛️ Everything's Loud\nsensory / mental noise" },
];

const SUPPORT = [
  { e:"🪣", w:"I Need to Vent",      s:"",                         t:"🪣 I Need to Vent" },
  { e:"👁️", w:"Just Read It",        s:"no reply needed",          t:"👁️ Just Read It\nno reply needed" },
  { e:"🔁", w:"Reflect Back",        s:"say what you heard",       t:"🔁 Reflect Back\nsay what you heard" },
  { e:"🧭", w:"Help Me Untangle",    s:"ask me questions",         t:"🧭 Help Me Untangle\nask me questions" },
  { e:"⏳", w:"Slow Replies OK",     s:"I need time",              t:"⏳ Slow Replies OK\nI need time" },
  { e:"🧲", w:"Nudge Me",            s:"if I go quiet",            t:"🧲 Nudge Me\nif I go quiet" },
  { e:"🗺️", w:"Talk Options",        s:"help me decide",           t:"🗺️ Talk Options\nhelp me decide" },
  { e:"📥", w:"Just Receive",        s:"no fixing needed",         t:"📥 Just Receive\nno fixing needed" },
  { e:"🔦", w:"Outside View",        s:"what do you notice?",      t:"🔦 Outside View\nwhat do you notice?" },
  { e:"📋", w:"List With Me",        s:"let's write it out",       t:"📋 List With Me\nlet's write it out" },
];


const TRAVEL = [
  { e:"✈️", w:"Flight Nerves",      s:"before takeoff",          t:"✈️ Flight Nerves\nbefore takeoff" },
  { e:"🛂", w:"Airport Overwhelm",  s:"queues & crowds",         t:"🛂 Airport Overwhelm\nqueues & crowds" },
  { e:"🧳", w:"Packing Panic",      s:"last-minute scramble",    t:"🧳 Packing Panic\nlast-minute scramble" },
  { e:"🗺️", w:"New Place, New Rules", s:"unfamiliar systems",    t:"🗺️ New Place, New Rules\nunfamiliar systems" },
  { e:"🌍", w:"Language Gap",       s:"can't find the words",    t:"🌍 Language Gap\ncan't find the words" },
  { e:"🕐", w:"Time Zone Drift",    s:"body clock's off",        t:"🕐 Time Zone Drift\nbody clock's off" },
  { e:"🏖️", w:"Can't Switch Off",   s:"holiday mode stuck",      t:"🏖️ Can't Switch Off\nholiday mode stuck" },
  { e:"🚕", w:"Transfer Stress",    s:"logistics piling up",     t:"🚕 Transfer Stress\nlogistics piling up" },
  { e:"🛏️", w:"Strange Bed",        s:"sleep thrown off",        t:"🛏️ Strange Bed\nsleep thrown off" },
  { e:"📋", w:"Itinerary Anxiety",  s:"too much planned",        t:"📋 Itinerary Anxiety\ntoo much planned" },
];

function buildGrid(cards, id) {
  const grid = document.getElementById(id);
  cards.forEach(card => {
    const el = document.createElement('div');
    el.className = 'chip';
    el.innerHTML = `
      <div class="icon-wrap">${card.e}</div>
      <div class="chip-word">${card.w}</div>
      ${card.s ? `<div class="chip-sub">${card.s}</div>` : ''}
    `;
    el.addEventListener('click', () => {
      navigator.clipboard.writeText(card.t).catch(() => {});
      el.classList.add('flash');
      setTimeout(() => el.classList.remove('flash'), 900);
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    });
    grid.appendChild(el);
  });
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
  document.getElementById(`pane-${tab}`).classList.add('active');
}

buildGrid(STATE, 'grid-state');
buildGrid(SUPPORT, 'grid-support');
buildGrid(TRAVEL, 'grid-travel');
if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js");
</script>
</body>
</html>
