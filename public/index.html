        <div style="font-size:${fontSize}px;line-height:${lineHeight};color:#e8e8f0;font-weight:400;letter-spacing:0.01em;">${twEsc(s)}</div>
      `).join('')}
    </div>
  `;

  document.body.appendChild(el);
  document.getElementById('tw-rv-close').onclick = () => el.remove();
}

function twOpen(text) {
  twText = text;
  twIdx = 0;
  twMode = spVal('chunkMode', 'sentence');
  chunkOpenTime = null;
  lastChunkIdx = -1;
  chunkRereadCount = 0;
  spTrackChunkOpen(0);
  twDraw();
}

function twDraw() {
  document.getElementById('tw-reader')?.remove();
  const wpm = spGetEffectiveWpm();
  const fontSize = spVal('fontSize', 20);
  const lineSpacingMap = { compact: '1.3', normal: '1.65', spacious: '2.1' };
  const lineHeight = lineSpacingMap[spVal('lineSpacing','normal')] || '1.65';
  const chunks = twChunk(twText, twMode);
  const i = Math.min(twIdx, chunks.length-1);
  const cur = chunks[i] || '';
  const pct = chunks.length > 0 ? ((i+1)/chunks.length)*100 : 0;

  const el = document.createElement('div');
  el.id = 'tw-reader';
  el.style.cssText = 'position:fixed;inset:0;background:#0f0f14;z-index:9999;display:flex;flex-direction:column;font-family:"DM Sans",sans-serif;color:#e8e8f0;';
  el.innerHTML = `
    <div style="display:flex;align-items:center;gap:12px;padding:16px 18px;border-bottom:1px solid rgba(255,255,255,0.07);flex-shrink:0;">
      <button id="tw-close" style="width:38px;height:38px;border-radius:50%;background:#1e1e28;border:none;color:#e8e8f0;cursor:pointer;font-size:18px;">✕</button>
      <div style="flex:1;">
        <div style="font-size:17px;font-weight:600;">Show read</div>
        <div style="font-size:12px;color:#5a5a72;margin-top:2px;">~${twDur(twTime(twText,wpm))} total · ${twSentences(twText).length} sentences</div>
      </div>
      <div style="display:flex;align-items:center;gap:6px;">
        <span style="font-size:11px;color:#5a5a72;">WPM</span>
        <input id="tw-wpm" type="number" min="50" max="600" value="${wpm}" style="width:56px;background:#1e1e28;border:1px solid rgba(255,255,255,0.07);border-radius:8px;padding:5px 6px;color:#e8e8f0;font-family:inherit;font-size:13px;text-align:center;outline:none;"/>
      </div>
    </div>
    <div style="display:flex;gap:8px;padding:12px 18px;border-bottom:1px solid rgba(255,255,255,0.07);flex-shrink:0;">
      ${['sentence','pair','paragraph'].map(m=>`<button class="tw-mode" data-m="${m}" style="padding:7px 16px;border-radius:999px;border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:500;background:${twMode===m?'#7c6af7':'#1e1e28'};color:${twMode===m?'#fff':'#9090a8'};">${m[0].toUpperCase()+m.slice(1)}</button>`).join('')}
    </div>
    <div style="flex:1;overflow-y:auto;padding:24px 22px;">
      <div style="font-size:${fontSize}px;line-height:${lineHeight};margin-bottom:24px;">${twEsc(cur)}</div>
      <div style="display:flex;flex-wrap:wrap;gap:10px;">
        <div style="background:#1e1e28;border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:8px 13px;font-size:12.5px;color:#9090a8;">⏱ ${twDur(twTime(cur,wpm))} for this step</div>
        <div style="background:#1e1e28;border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:8px 13px;font-size:12.5px;color:#9090a8;">🔤 ${twWords(cur)} words</div>
      </div>
    </div>
    <div style="flex-shrink:0;padding:14px 18px 28px;border-top:1px solid rgba(255,255,255,0.07);background:#17171f;">
      <div style="height:6px;border-radius:3px;background:#1e1e28;overflow:hidden;margin-bottom:14px;"><div style="width:${pct}%;height:100%;background:#7c6af7;border-radius:3px;"></div></div>
      <div style="display:flex;align-items:center;gap:12px;">
        <button id="tw-prev" style="width:54px;height:54px;border-radius:50%;border:none;background:#1e1e28;color:#e8e8f0;font-size:26px;cursor:pointer;opacity:${i===0?0.3:1};" ${i===0?'disabled':''}>‹</button>
        <span style="flex:1;text-align:center;font-size:13px;color:#5a5a72;">Step ${i+1} of ${chunks.length}</span>
        <button id="tw-next" style="width:54px;height:54px;border-radius:50%;border:none;background:#7c6af7;color:#fff;font-size:26px;cursor:pointer;opacity:${i>=chunks.length-1?0.3:1};" ${i>=chunks.length-1?'disabled':''}>›</button>
      </div>
    </div>`;

  document.body.appendChild(el);
  document.getElementById('tw-close').onclick = () => {
    spTrackChunkClose(twWords(cur));
    el.remove();
  };
  document.getElementById('tw-prev').onclick = () => {
    spTrackChunkClose(twWords(cur));
    twIdx = Math.max(0,i-1);
    spTrackChunkOpen(twIdx);
    twDraw();
  };
  document.getElementById('tw-next').onclick = () => {
    spTrackChunkClose(twWords(cur));
    twIdx = Math.min(chunks.length-1,i+1);
    spTrackChunkOpen(twIdx);

  };

  el.querySelectorAll('.tw-mode').forEach(b => { b.onclick = () => { twMode=b.dataset.m; twIdx=0; spSet({chunkMode:twMode}); twDraw(); }; });
}

// Single document-level listener — survives all re-renders
document.addEventListener('click', e => {
  const btn = e.target.closest('.read-btn');
  if (btn && btn.dataset.txt) {
    e.stopPropagation();
    const text = decodeURIComponent(btn.dataset.txt);
    if (btn.dataset.readview) {
      openReadingView(text);
    } else if (btn.dataset.reformat) {
      openReformatView(text);
    } else if (btn.dataset.summarise) {
      openSummariseView(text);
    } else {
      twOpen(text);
    }
  }
  // Status icon add button
  const statusAdd = e.target.closest('.msg-status-add');
  if (statusAdd) {
    e.stopPropagation();
    openStatusIconPicker(statusAdd.dataset.msgid);
  }
  // Status chip — tap to change
  const statusChip = e.target.closest('.msg-status-chip');
  if (statusChip) {
    e.stopPropagation();
    const wrap = statusChip.closest('.msg-status-icons');
    if (wrap) openStatusIconPicker(wrap.dataset.msgid);
  }
});

const VERIFY_CUTOFF = new Date('2026-05-05').getTime();

function needsVerification(user) {
  if (!user || user.emailVerified) return false;
  const created = user.metadata?.creationTime;
  if (!created) return false;
  // Only gate accounts created after this update — existing users unaffected
  return new Date(created).getTime() > VERIFY_CUTOFF;
}

function showVerificationGate(user) {
  document.getElementById('tw-verify-gate')?.remove();

  const el = document.createElement('div');
  el.id = 'tw-verify-gate';
  el.style.cssText = 'position:fixed;inset:0;background:#0f0f14;z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;font-family:"DM Sans",sans-serif;color:#e8e8f0;text-align:center;';
  el.innerHTML = `
    <div style="font-size:48px;margin-bottom:20px;">✉️</div>
    <div style="font-size:22px;font-weight:700;margin-bottom:10px;">Check your email</div>
    <div style="font-size:15px;color:#5a5a72;line-height:1.6;margin-bottom:8px;">We sent a verification link to:</div>
    <div style="font-size:15px;color:#a78bfa;font-weight:600;margin-bottom:28px;">${user.email}</div>
    <div style="font-size:13px;color:#5a5a72;line-height:1.6;margin-bottom:32px;max-width:320px;">Click the link in that email, then come back here and tap the button below. You only need to do this once.</div>
    <button id="tw-verify-check" style="width:100%;max-width:320px;padding:16px;border-radius:14px;border:none;background:#7c6af7;color:#fff;font-family:inherit;font-size:16px;font-weight:600;cursor:pointer;margin-bottom:12px;">I've verified — let me in</button>
    <button id="tw-verify-resend" style="width:100%;max-width:320px;padding:14px;border-radius:14px;border:none;background:#1e1e28;color:#9090a8;font-family:inherit;font-size:14px;cursor:pointer;margin-bottom:20px;">Resend verification email</button>
    <button id="tw-verify-signout" style="background:none;border:none;color:#3a3a52;font-family:inherit;font-size:13px;cursor:pointer;">Sign out and use a different account</button>
  `;
  document.body.appendChild(el);

  let resendCooldown = false;

  document.getElementById('tw-verify-check').onclick = async () => {
    const btn = document.getElementById('tw-verify-check');
    btn.textContent = 'Checking…';
    btn.disabled = true;
    try {
      // Force reload from Firebase servers — not local cache
      await auth.currentUser.reload();
      const freshUser = auth.currentUser;
      // Double check — must be explicitly true, not just truthy
      if (freshUser && freshUser.emailVerified === true) {
        el.remove();
        currentUser = freshUser;
        showToast('Email verified ✓ Welcome to Threadwise!');
        render();
      } else {
        // Not verified — tell them clearly and re-enable
        btn.textContent = 'Not verified yet — check your email';
        btn.disabled = false;
        setTimeout(() => {
          if (document.getElementById('tw-verify-check')) {
            btn.textContent = 'I\'ve verified — let me in';
          }
        }, 3000);
      }
    } catch(e) {
      // Reload failed — do not let them in
      btn.textContent = 'Could not check — try again';
      btn.disabled = false;
      console.error('Verification check failed:', e);
    }
  };

  document.getElementById('tw-verify-resend').onclick = async () => {
    if (resendCooldown) { showToast('Please wait 60 seconds before resending'); return; }
    resendCooldown = true;
    const btn = document.getElementById('tw-verify-resend');
    btn.textContent = 'Sent — check your inbox';
    setTimeout(() => {
      resendCooldown = false;
      if (btn) btn.textContent = 'Resend verification email';
    }, 60000);
    try {
      await sendEmailVerification(auth.currentUser, {
        url: 'https://threadwise-8b8f5.web.app'
      });
      showToast('Verification email sent ✓');
    } catch(e) { showToast('Could not resend: ' + e.message); }
  };

  document.getElementById('tw-verify-signout').onclick = async () => {
    el.remove();
    await signOut(auth);
  };
}

          ` : ''}
        </div>

        ${isFeeling && selectedIcon ? `

            <div style="font-size:12px;color:#5a5a72;margin-bottom:10px;font-weight:600;">HOW MUCH?</div>
            <div style="display:flex;gap:8px;">

                <button class="ip-intensity ${selectedIntensity===i?'active':''}" data-intensity="${i}"
                  style="flex:1;padding:8px 4px;border-radius:10px;border:1.5px solid ${selectedIntensity===i?'var(--accent)':'transparent'};background:${selectedIntensity===i?'rgba(124,106,247,0.15)':'#1e1e28'};cursor:pointer;">

                  <div style="font-size:10px;color:#9090a8;margin-top:3px;">${s.label}</div>

              <div style="font-size:12px;color:#5a5a72;margin-top:10px;font-style:italic;">Like ${selectedIcon.metaphor}</div>
            ` : ''}

    el.querySelectorAll('.ip-cat').forEach(btn => {
      btn.onclick = () => { activeCategory = btn.dataset.cat; selectedIcon = null; renderPanel(); };
    });

    // Bind icon selection
    el.querySelectorAll('.ip-icon').forEach(btn => {
      btn.onclick = () => {
        const all = [...FEELING_CATEGORIES[activeCategory], ...customIcons];
        selectedIcon = all.find(ic => ic.id === btn.dataset.id);
        renderPanel();
      };
    });

    // Bind intensity
    el.querySelectorAll('.ip-intensity').forEach(btn => {
      btn.onclick = () => { selectedIntensity = parseInt(btn.dataset.intensity); renderPanel(); };

    document.getElementById('ip-add-custom')?.addEventListener('click', () => openAddCustomIcon(() => { loadCustomIcons().then(() => renderPanel()); }));

      const intensityLabel = isFeeling ? INTENSITY_SHADES[selectedIntensity].label + ' ' : '';

      await sendIconMessage(msgText, selectedIcon.color || null);
    };
  }

  document.body.appendChild(el);
  loadCustomIcons().then(() => renderPanel());
}

async function sendIconMessage(text, color) {
  if (!activeConvoId || !currentUser) return;
  const convo = conversations.find(c => c.id === activeConvoId);
  const otherUid = convo?.participants?.find(u => u !== currentUser.uid);
  try {
    await addDoc(collection(db, 'conversations', activeConvoId, 'messages'), {
      text,
      iconColor: color || null,
      isIcon: true,
      senderId: currentUser.uid,
      senderName: currentUser.displayName || currentUser.email,
      createdAt: serverTimestamp(),
      read: false
    });
    await updateDoc(doc(db, 'conversations', activeConvoId), {
      lastMessage: text,
      lastMessageAt: serverTimestamp(),
      ...(otherUid ? { [`unreadCounts.${otherUid}`]: increment(1) } : {})
    });
  } catch(e) { showToast('Could not send: ' + e.message); }
}

    </div>
  `;
  document.body.appendChild(el);
  document.getElementById('tw-sum-close').onclick = () => el.remove();

  // Split into chunks preserving detail
  const sentences = twSentences(text);
  const chunks = [];

    chunks.push(sentences.slice(i, i+3).join(' '));
  }

  const body = document.getElementById('tw-sum-body');
  if (body) {
    body.style.alignItems = 'flex-start';
    body.style.justifyContent = 'flex-start';
    body.innerHTML = `
      <div style="display:flex;flex-direction:column;gap:14px;width:100%;">
        <div style="font-size:13px;color:#5a5a72;margin-bottom:4px;">Same detail, shorter chunks:</div>
        ${chunks.map((c, i) => `
          <div style="background:#1a1a24;border-radius:14px;padding:14px 16px;">
            <div style="font-size:11px;color:#5a5a72;margin-bottom:6px;font-weight:600;">PART ${i+1}</div>

          </div>
        `).join('')}
      </div>
    `;
  }
}

// ── Deep-link / shortcut / notification handler ──────────────────────────
// Runs after auth resolves — reads URL params set by shortcuts or notif taps
function handleDeepLink() {
  const params = new URLSearchParams(window.location.search);
  const action  = params.get('action');
  const convoId = params.get('convo');

  if (convoId) {
    // Opened from a notification — jump straight to that convo
    const convo = conversations.find(c => c.id === convoId);
    if (convo) openConvo(convoId);
    return;
  }
  if (action === 'new-chat') {
    showNewChat = true; render();
  } else if (action === 'self-thread') {
    openSelfThread();
  }
}

// ── Background Sync registration helper ───────────────────────────────────
async function registerBackgroundSync() {
  if (!('serviceWorker' in navigator) || !('SyncManager' in window)) return;
  try {
    const reg = await navigator.serviceWorker.ready;
    await reg.sync.register('tw-message-sync');
  } catch(e) { /* not supported — queue flush handles it instead */ }
}

// ── Listen for messages from the service worker ───────────────────────────
navigator.serviceWorker?.addEventListener('message', event => {
  if (event.data?.type === 'SYNC_FLUSH') {
    flushOfflineQueue();
  } else if (event.data?.type === 'OPEN_CONVO' && event.data.convoId) {
    const convo = conversations.find(c => c.id === event.data.convoId);
    if (convo) openConvo(event.data.convoId);
  }
});

// ── Boot ──────────────────────────────────────────────────────────────────
// Check initial online status
if (!navigator.onLine) updateOnlineIndicator(false);
if (!CONFIG_FILLED) {
  render();
} else {
  initFirebase();

  // Presence on window events
  // Only mark offline on actual unload (tab close / navigation away),
  // not on visibility change — backgrounding a PWA is not the same as leaving.
  window.addEventListener('beforeunload', () => setPresence(false));
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden && currentUser) {
      // Coming back to foreground — re-assert online
      setPresence(true);
    }
    // Do NOT set offline on hidden — app may just be backgrounded on mobile
  });
  // Also re-assert presence when the page regains focus
  window.addEventListener('focus', () => {
    if (currentUser) setPresence(true);
  });

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      currentUser = user;

      // Save user to localStorage so we can load offline
      try {
        localStorage.setItem('tw_user', JSON.stringify({
          uid: user.uid,
          displayName: user.displayName,
          email: user.email,
          emailVerified: user.emailVerified
        }));
      } catch(e) {}

      // Show verification gate for new unverified users
      if (needsVerification(user)) {
        showVerificationGate(user);
        return;
      }

      // Restore last open convo so force-close doesn't reset navigation
      sessionRestore();

      // Load from localStorage cache immediately — works offline
      loadConversationsFromCache();

      // Pre-load cached messages for the restored convo so UI shows instantly
      if (activeConvoId) {
        try {
          const raw = localStorage.getItem('tw_msgs_' + activeConvoId);
          if (raw) {
            messages = JSON.parse(raw).map(m => ({
              ...m,
              createdAt: m.createdAt ? { toMillis: () => m.createdAt, toDate: () => new Date(m.createdAt) } : null
            }));
          }
        } catch(e) {}
      }

      render();

      // Restore live subscription for the open convo
      if (activeConvoId && navigator.onLine) subscribeMessages(activeConvoId);

      // Then try Firestore — only if online
      if (navigator.onLine) {
        try {
          const userDoc = await getDoc(doc(db, 'users', user.uid));
          if (!userDoc.exists()) {
            await setDoc(doc(db, 'users', user.uid), {
              uid: user.uid,
              displayName: user.displayName || user.email,
              email: user.email,
              createdAt: serverTimestamp(),
              online: true,
              lastSeen: serverTimestamp()
            });
          } else {
            await updateDoc(doc(db, 'users', user.uid), { online: true, lastSeen: serverTimestamp() });
          }
        } catch(e) {}
      }

      subscribeConversations();
      flushOfflineQueue();
      registerBackgroundSync();
      setTimeout(handleDeepLink, 400); // wait for convos to load first

      const notifPref = localStorage.getItem('tw_notif');
      if (!notifPref || notifPref === 'later') {
        setTimeout(() => askNotificationPermission(), 3000);
      }
    } else {
      // Auth returned null — check if we have a cached user for offline mode
      const cachedUser = (() => { try { return JSON.parse(localStorage.getItem('tw_user')); } catch { return null; } })();
      if (cachedUser && !navigator.onLine) {
        // Offline with cached user — load from cache without full auth
        currentUser = cachedUser;
        loadConversationsFromCache();
        render();
        return;
      }
      currentUser = null;
      localStorage.removeItem('tw_user');
      if (unsubConvos) { unsubConvos(); unsubConvos = null; }
      if (unsubMessages) { unsubMessages(); unsubMessages = null; }
      conversations = []; messages = []; activeConvoId = null;
      render();
    }
  });
}
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
      navigator.serviceWorker.register('./firebase-messaging-sw.js').catch(() => {});
    });
  }

  // ── Visual Viewport: push input area above the soft keyboard on iOS/Android ─
  // Standard browsers resize the viewport when the keyboard opens, but
  // Safari on iOS does not when running as a PWA. This polyfills it.
  if (window.visualViewport) {
    let pendingRaf = null;
    function onViewportResize() {
      if (pendingRaf) cancelAnimationFrame(pendingRaf);
      pendingRaf = requestAnimationFrame(() => {
        const vv = window.visualViewport;
        const offsetBottom = window.innerHeight - vv.height - vv.offsetTop;
        const inputArea = document.querySelector('.input-area');
        if (inputArea) {
          // Lift the input bar above the keyboard; let CSS safe-area handle the rest
          inputArea.style.paddingBottom = offsetBottom > 20
            ? offsetBottom + 'px'
            : '';
        }
      });
    }
    window.visualViewport.addEventListener('resize', onViewportResize);
    window.visualViewport.addEventListener('scroll', onViewportResize);
  }

  // ── Standalone detection ────────────────────────────────────────────────
  (function() {
    const isStandalone =
      window.matchMedia('(display-mode: standalone)').matches ||
      window.navigator.standalone === true;
    if (isStandalone) document.documentElement.classList.add('pwa-standalone');
  })();

  // ── beforeinstallprompt: capture for in-app "Add to Home Screen" ─────────
  // Chrome/Android fires this before showing the mini install bar.
  // We prevent the default, store it, and show our own prompt when ready.
  let _installPrompt = null;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    _installPrompt = e;
    // Show install banner after a short delay if not already standalone
    const isStandalone =
      window.matchMedia('(display-mode: standalone)').matches ||
      window.navigator.standalone === true;
    if (!isStandalone) setTimeout(showInstallBanner, 5000);
  });

  window.addEventListener('appinstalled', () => {
    _installPrompt = null;
    document.getElementById('tw-install-banner')?.remove();
    localStorage.setItem('tw_installed', '1');
  });

  function showInstallBanner() {
    if (!_installPrompt) return;
    if (localStorage.getItem('tw_install_dismissed') === '1') return;
    if (localStorage.getItem('tw_installed') === '1') return;
    document.getElementById('tw-install-banner')?.remove();

    const banner = document.createElement('div');
    banner.id = 'tw-install-banner';
    banner.style.cssText = [
      'position:fixed','bottom:80px','left:16px','right:16px',
      'background:#17171f','border:1px solid rgba(124,106,247,0.35)',
      'border-radius:16px','padding:14px 16px','z-index:9500',
      'display:flex','align-items:center','gap:12px',
      'box-shadow:0 8px 32px rgba(0,0,0,0.5)',
      'font-family:"DM Sans",sans-serif'
    ].join(';');
    banner.innerHTML = `
      <span style="font-size:28px;flex-shrink:0;">📲</span>
      <div style="flex:1;">
        <div style="font-size:14px;font-weight:600;color:#e8e8f0;">Install Threadwise</div>
        <div style="font-size:12px;color:#5a5a72;margin-top:2px;">Add to your home screen for the full app experience</div>
      </div>
      <button id="tw-install-yes" style="padding:8px 14px;border-radius:10px;border:none;background:#7c6af7;color:#fff;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;flex-shrink:0;">Install</button>
      <button id="tw-install-no"  style="background:none;border:none;color:#5a5a72;font-size:18px;cursor:pointer;padding:4px;flex-shrink:0;">✕</button>
    `;
    document.body.appendChild(banner);

    document.getElementById('tw-install-yes').onclick = async () => {
      banner.remove();
      if (!_installPrompt) return;
      _installPrompt.prompt();
      const { outcome } = await _installPrompt.userChoice;
      if (outcome === 'accepted') localStorage.setItem('tw_installed', '1');
      _installPrompt = null;
    };
    document.getElementById('tw-install-no').onclick = () => {
      banner.remove();
      localStorage.setItem('tw_install_dismissed', '1');
    };
  }
</script>
</body>
</html>
